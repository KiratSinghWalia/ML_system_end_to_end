[loggers]
keys=root,main_application,mlflow,tensorflow,botocore.credentials

[handlers]
keys=consoleHandler

[formatters]
keys=simpleFormatter

[logger_root]
level=INFO
handlers=consoleHandler

[logger_main_application]
level=INFO
handlers=consoleHandler
qualname=main_application
propagate=0

[logger_mlflow]
level=ERROR
handlers=consoleHandler
qualname=mlflow

[logger_tensorflow]
level=ERROR
handlers=consoleHandler
qualname=tensorflow

[logger_botocore.credentials]
level=ERROR
handlers=consoleHandler
qualname=botocoreCredentials


[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=simpleFormatter
args=(sys.stdout,)

[formatter_simpleFormatter]
format=%(asctime)s - %(name)s - %(levelname)s - %(message)s
datefmt=%Y-%m-%d %H:%M:%S
